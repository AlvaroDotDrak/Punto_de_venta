<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo con esquinas redondeadas -->
  <rect width="512" height="512" rx="96" fill="#C97B4B"/>

  <!-- Torta: base -->
  <rect x="88" y="318" width="336" height="88" rx="16" fill="white" opacity="0.95"/>
  <!-- Torta: capa superior -->
  <rect x="120" y="222" width="272" height="88" rx="16" fill="white" opacity="0.92"/>
  <!-- Glasé superior -->
  <rect x="120" y="208" width="272" height="28" rx="10" fill="#E8A87C"/>
