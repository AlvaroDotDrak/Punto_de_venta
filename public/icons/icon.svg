  <ellipse cx="220" cy="236" rx="20" ry="10" fill="white" opacity="0.6"/>
  <ellipse cx="272" cy="236" rx="20" ry="10" fill="white" opacity="0.6"/>
  <ellipse cx="324" cy="236" rx="20" ry="10" fill="white" opacity="0.6"/>

  <!-- Vela -->
  <rect x="242" y="148" width="28" height="60" rx="6" fill="#FFF3CD"/>
  <rect x="242" y="148" width="28" height="12" rx="3" fill="#FFEAA7"/>
  <!-- Llama -->
